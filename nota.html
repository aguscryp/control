<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>SIK - Notas de Enfoque</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ESTÉTICA CYBER-EXECUTIVE NOIR --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 75px 16px 20px 16px; /* Padding superior para que el contenido no quede abajo del navbar */
            letter-spacing: -0.2px;
        }

        /* --- NAVBAR SUPERIOR FIJO --- */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
        }

        .menu-hamburger-btn {
            background: transparent;
            border: 0;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        .navbar-right-space {
            width: 40px; /* Balancea el espacio del botón izquierdo para centrar el título */
        }

        /* --- SIK SIDEBAR (MENÚ LATERAL) --- */
        .sik-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: rgba(18, 18, 20, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 20px 0 40px rgba(0, 0, 0, 0.8);
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
        }
        .sik-sidebar.open {
            transform: translateX(280px);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .sidebar-brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .close-sidebar-btn { background: transparent; border: 0; color: #8e8e93; font-size: 18px; cursor: pointer; }

        .sidebar-menu-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-menu-item:active { background: rgba(255, 255, 255, 0.05); }
        .sidebar-menu-item.active {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .sidebar-icon-wrap {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 13px;
        }

        /* Cromática Neón SIK para Sidebar */
        .ic-chart   { background: linear-gradient(135deg, #004757, #001f26); color: #64d2ff; }
        .ic-wallet  { background: linear-gradient(135deg, #0b4622, #031409); color: #30d158; }
        .ic-users   { background: linear-gradient(135deg, #441461, #1b052b); color: #bf5af2; }
        .ic-target  { background: linear-gradient(135deg, #521616, #210505); color: #ff453a; }
        .ic-cal     { background: linear-gradient(135deg, #523400, #241600); color: #ff9f0a; }
        .ic-msg     { background: linear-gradient(135deg, #0a3361, #031429); color: #0a84ff; }
        .ic-shield  { background: linear-gradient(135deg, #404043, #1c1c1e); color: #e5e5ea; }
        .ic-bolt    { background: linear-gradient(135deg, #4d4400, #211d00); color: #ffd60a; }
        .ic-folder  { background: linear-gradient(135deg, #422a14, #1f1205); color: #f5a623; }
        .ic-link    { background: linear-gradient(135deg, #204857, #0b1e26); color: #70e0ff; }
        .ic-key     { background: linear-gradient(135deg, #574d11, #211d04); color: #ffdf43; }
        .ic-bell    { background: linear-gradient(135deg, #541d4b, #21041c); color: #ff6bf2; }
        .ic-briefcase{ background: linear-gradient(135deg, #2d3b4d, #121921); color: #a2b5cd; }
        .ic-terminal{ background: linear-gradient(135deg, #184734, #051a10); color: #43ff9f; }
        .ic-config  { background: linear-gradient(135deg, #2c2c2e, #121214); color: #8e8e93; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; z-index: 1500;
        }
        .sidebar-overlay.show { display: block; }

        /* --- BLOC DE NOTAS --- */
        .workspace-card {
            background: linear-gradient(145deg, rgba(28, 28, 30, 0.5) 0%, rgba(18, 18, 20, 0.7) 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .status-sync { font-size: 11px; color: #30d158; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        .notes-textarea {
            width: 100%;
            height: 60vh;
            background: transparent;
            border: 0;
            color: #ffffff;
            font-size: 15px;
            line-height: 22px;
            resize: none;
            outline: none;
            padding: 4px 0;
        }
        .notes-textarea::placeholder { color: #444446; }

        .footer-metrics {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 12px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8e8e93;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <button class="menu-hamburger-btn" onclick="openSidebar()">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="brand-title">Bloc de Notas</div>
        <div class="navbar-right-space"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sik-sidebar" id="sikSidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">SIK</div>
            <button class="close-sidebar-btn" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="sidebar-menu-list" id="sidebarMenuList">
            </ul>
    </div>

    <div class="workspace-card">
        <div class="header-area">
            <h2>Notas Rápidas</h2>
            <div class="status-sync" id="syncStatus">
                <i class="fa-solid fa-cloud-arrow-up"></i> Guardado local
            </div>
        </div>

        <textarea 
            id="focusNotes" 
            class="notes-textarea" 
            placeholder="Escribí acá tus ideas, recordatorios estratégicos o tareas de enfoque diario..."
            oninput="handleNoteInput()"></textarea>

        <div class="footer-metrics">
            <span id="charCount">0 caracteres</span>
            <span id="lastSavedTime">Último cambio: --:--</span>
        </div>
    </div>

    <script>
        // --- CONTROL DEL BLOC DE NOTAS ---
        const notesArea = document.getElementById('focusNotes');
        const syncStatus = document.getElementById('syncStatus');
        const charCount = document.getElementById('charCount');
        const lastSavedTime = document.getElementById('lastSavedTime');
        let saveTimeout = null;

        // Cargar nota inicial
        function loadSavedNote() {
            const savedText = localStorage.getItem('sik_focus_notes') || "";
            notesArea.value = savedText;
            updateMetrics(savedText);
        }

        // Manejar input con auto-guardado inteligente (Debounce de 500ms)
        function handleNoteInput() {
            const text = notesArea.value;
            updateMetrics(text);
            
            syncStatus.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando...`;
            syncStatus.style.color = "#ffd60a";

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('sik_focus_notes', text);
                syncStatus.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Guardado local`;
                syncStatus.style.color = "#30d158";
                
                const now = new Date();
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                lastSavedTime.innerText = `Último cambio: ${hrs}:${mins}`;
            }, 500);
        }

        function updateMetrics(text) {
            charCount.innerText = `${text.length} caracteres`;
        }


        // --- ESTRUCTURA DE MENÚ INTEGRADO ---
        const defaultCoreMenu = [
            { label: "Dashboard", link: "org.html", iconClass: "ic-chart", iconText: "fa-solid fa-chart-pie", active: true },
            { label: "Configurar Menú", link: "menu.html", iconClass: "ic-config", iconText: "fa-solid fa-sliders", active: true }
        ];

        function openSidebar() {
            document.getElementById('sikSidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
        }

        function closeSidebar() {
            document.getElementById('sikSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }

        function buildSidebarMenu() {
            const coreMenu = JSON.parse(localStorage.getItem('sik_menu_items_core')) || defaultCoreMenu;
            const customMenu = JSON.parse(localStorage.getItem('sik_menu_items_custom')) || [];
            const completeList = [...coreMenu, ...customMenu];

            const container = document.getElementById('sidebarMenuList');
            container.innerHTML = "";

            completeList.forEach(item => {
                if(item.active === false) return; // Saltarse elementos inactivos

                const li = document.createElement('li');
                const isCurrentPage = item.link === "nota.html";

                li.innerHTML = `
                    <a href="${item.link}" class="sidebar-menu-item ${isCurrentPage ? 'active' : ''}">
                        <div class="sidebar-icon-wrap ${item.iconClass || 'ic-chart'}">
                            <i class="${item.iconText || 'fa-solid fa-chart-pie'}"></i>
                        </div>
                        <span>${item.label}</span>
                    </a>
                `;
                container.appendChild(li);
            });
        }

        // Inicializar la vista al cargar la pantalla
        document.addEventListener("DOMContentLoaded", () => {
            loadSavedNote();
            buildSidebarMenu();
        });
    </script>
</body>
</html>
