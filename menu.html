<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>SIK - Configurar Menú</title>
    <style>
        /* --- ESTÉTICA CYBER-EXECUTIVE NOIR --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 20px 16px;
            letter-spacing: -0.2px;
        }

        /* --- BARRA SUPERIOR DE NAVEGACIÓN --- */
        .top-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .back-btn {
            background: rgba(28, 28, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #8e8e93;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .config-card {
            background: linear-gradient(145deg, rgba(28, 28, 30, 0.5) 0%, rgba(18, 18, 20, 0.7) 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 18px;
            line-height: 16px;
        }

        /* --- FORMULARIO DE INGRESO COMPACTO --- */
        .menu-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.emoji-width {
            flex: 0 0 70px;
        }

        label {
            font-size: 10px;
            color: #aeaeae;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .form-control {
            width: 100%;
            background-color: #1c1c1e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .form-control:focus {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .add-btn {
            background-color: #ffffff;
            color: #000000;
            border: 0;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .add-btn:active {
            opacity: 0.8;
        }

        /* --- LISTA DE ITEMS ULTRA-COMPACTA --- */
        .items-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8e8e93;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .menu-items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .menu-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 10px 12px;
            border-radius: 10px;
        }

        .item-main-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-icon-box {
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .item-text-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .item-label-txt {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .item-link-txt {
            font-size: 11px;
            color: #64d2ff;
            font-family: monospace;
        }

        .delete-item-btn {
            background: transparent;
            border: 0;
            color: rgba(255, 69, 58, 0.6);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            border-radius: 6px;
        }
        .delete-item-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <!-- BARRA SUPERIOR -->
    <div class="top-navbar">
        <a href="org.html" class="back-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Volver
        </a>
        <div class="brand-title">Estructura SIK</div>
        <div style="width: 75px;"></div>
    </div>

    <!-- PANEL DE CONFIGURACIÓN -->
    <div class="config-card">
        <h2>Menú Lateral</h2>
        <div class="subtitle">Agregá o remové los accesos directos que ven los usuarios logeados en la barra de control central.</div>

        <!-- FORMULARIO NUEVA SECCIÓN -->
        <form class="menu-form" id="menuForm" onsubmit="addMenuItem(event)">
            <div class="form-row">
                <div class="form-group emoji-width">
                    <label>Ícono</label>
                    <input type="text" id="itemIcon" class="form-control" placeholder="📊" required maxlength="2" style="text-align: center;">
                </div>
                <div class="form-group">
                    <label>Nombre de Sección</label>
                    <input type="text" id="itemLabel" class="form-control" placeholder="Ej. Prospectos" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Archivo de Destino (.html)</label>
                <input type="text" id="itemLink" class="form-control" placeholder="Ej. prospectos.html" required>
            </div>

            <button type="submit" class="add-btn">Agregar Enlace</button>
        </form>

        <!-- LISTADO ACTUAL -->
        <div class="items-title">Secciones Activas</div>
        <ul class="menu-items-list" id="menuItemsList"></ul>
    </div>

    <script>
        // Si no existe nada guardado en LocalStorage, cargamos la configuración inicial por defecto
        const defaultMenu = [
            { label: "Control Central", link: "org.html", icon: "📊" }
        ];

        let menuItems = JSON.parse(localStorage.getItem('sik_menu_items')) || defaultMenu;

        function renderMenuItems() {
            const listContainer = document.getElementById('menuItemsList');
            listContainer.innerHTML = "";

            if (menuItems.length === 0) {
                listContainer.innerHTML = `<div style="padding: 20px; text-align: center; color: #636366; font-size: 12px;">No hay accesos configurados</div>`;
                return;
            }

            menuItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'menu-item-row';
                li.innerHTML = `
                    <div class="item-main-info">
                        <div class="item-icon-box">${item.icon}</div>
                        <div class="item-text-details">
                            <span class="item-label-txt">${item.label}</span>
                            <span class="item-link-txt">${item.link}</span>
                        </div>
                    </div>
                    <button class="delete-item-btn" onclick="deleteMenuItem(${index})">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                `;
                listContainer.appendChild(li);
            });
        }

        function addMenuItem(e) {
            e.preventDefault();
            
            const labelInput = document.getElementById('itemLabel');
            const linkInput = document.getElementById('itemLink');
            const iconInput = document.getElementById('itemIcon');

            // Limpieza básica de la extensión si se olvidan de ponerla
            let targetLink = linkInput.value.trim();
            if(!targetLink.includes('.')) {
                targetLink += '.html';
            }

            const newItem = {
                label: labelInput.value.trim(),
                link: targetLink,
                icon: iconInput.value.trim()
            };

            menuItems.push(newItem);
            localStorage.setItem('sik_menu_items', JSON.stringify(menuItems));
            
            // Resetear formulario
            labelInput.value = "";
            linkInput.value = "";
            iconInput.value = "🔹"; // Deja uno por defecto para la próxima

            renderMenuItems();
        }

        function deleteMenuItem(index) {
            if(confirm("¿Remover este acceso del menú lateral?")) {
                menuItems.splice(index, 1);
                localStorage.setItem('sik_menu_items', JSON.stringify(menuItems));
                renderMenuItems();
            }
        }

        // Ejecutar carga inicial
        renderMenuItems();
    </script>
</body>
</html>
